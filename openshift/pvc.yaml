apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: segment-manager-data-pvc
  namespace: segment-manager
  labels:
    app: network-segment-manager
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  # Use default storage class or adjust based on your OpenShift cluster
  # storageClassName: gp2  # Common storage class names: gp2, standard, fast, slow
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: segment-manager-logs-pvc
  namespace: segment-manager
  labels:
    app: network-segment-manager
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  # Use default storage class or adjust based on your OpenShift cluster
  # storageClassName: gp2  # Common storage class names: gp2, standard, fast, slow